<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agency Sales OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fff;--bg2:#f7f8f5;--bg3:#f0f2ed;
  --bd:#e4e8df;--bd2:#cdd4c6;
  --tx:#1a1f17;--tx2:#5a6654;--tx3:#9aa890;
  --ac:#1e9e5e;--acl:#e8f7ef;--acm:#a8dfc0;--acd:#157a48;
  --am:#d97706;--aml:#fef3c7;
  --rd:#dc2626;--rdl:#fee2e2;
  --bl:#2563eb;--bll:#eff6ff;
  --pu:#7c3aed;--pul:#f5f3ff;
  --rc:#ff6600;--rcl:#fff3eb;
  --ff:#7c5cfc;--ffl:#f5f3ff;
}
html,body{height:100%;background:var(--bg2);color:var(--tx);font-family:Arial,Helvetica,sans-serif;font-size:13px;}
h1,h2,h3{font-family:'Libre Baskerville',Georgia,serif;}
button{cursor:pointer;font-family:Arial,Helvetica,sans-serif;}
input,select,textarea{font-family:Arial,Helvetica,sans-serif;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg3);}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px;}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:54px;border-bottom:1px solid var(--bd);background:var(--bg);flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.brand{display:flex;align-items:center;gap:9px;}
.brand h1{font-size:15px;font-weight:700;color:var(--tx);}
.brand-dot{width:8px;height:8px;border-radius:50%;background:var(--ac);}
.nav-tabs{display:flex;gap:2px;overflow-x:auto;}
.tab{padding:5px 10px;border-radius:7px;font-size:11px;color:var(--tx2);border:none;background:transparent;font-weight:500;transition:all .15s;white-space:nowrap;}
.tab:hover{background:var(--bg2);color:var(--tx);}
.tab.on{background:var(--acl);color:var(--acd);border:1px solid var(--acm);font-weight:600;}
.tab.rc.on{background:var(--rcl);color:var(--rc);border-color:var(--rc);}
.live{background:var(--acl);color:var(--acd);font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid var(--acm);font-weight:600;white-space:nowrap;}
.content{flex:1;overflow-y:auto;padding:20px;background:var(--bg2);}
.chat-wrap-outer{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.card{background:var(--bg);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.03);}
.ct{font-size:13px;font-weight:700;color:var(--tx);display:flex;align-items:center;gap:6px;margin-bottom:12px;}
.mg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.mc{background:var(--bg);border:1px solid var(--bd);border-radius:12px;padding:13px 15px;box-shadow:0 1px 2px rgba(0,0,0,.03);}
.ml{font-size:11px;color:var(--tx2);margin-bottom:4px;font-weight:500;}
.mv{font-family:'Libre Baskerville',Georgia,serif;font-size:23px;color:var(--tx);line-height:1;}
.ms{font-size:11px;color:var(--tx3);margin-top:3px;}
.ms.up{color:var(--ac);}
.ms.wn{color:var(--am);}
.pb{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:6px;}
.pf{height:100%;border-radius:3px;background:var(--ac);}
.dt{width:100%;border-collapse:collapse;}
.dt th{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;padding:8px 11px;text-align:left;border-bottom:1px solid var(--bd);font-weight:700;background:var(--bg2);}
.dt td{padding:9px 11px;border-bottom:1px solid var(--bd);font-size:12px;color:var(--tx);vertical-align:middle;}
.dt tr:last-child td{border-bottom:none;}
.dt tr:hover td{background:var(--bg2);}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.p-new{background:var(--bll);color:var(--bl);}
.p-working{background:var(--aml);color:var(--am);}
.p-booked,.p-won{background:var(--acl);color:var(--acd);}
.p-won{border:1px solid var(--acm);}
.p-lost,.p-dup{background:var(--rdl);color:var(--rd);}
.p-disq{background:var(--bg3);color:var(--tx3);}
.p-call{background:#ecfeff;color:#0891b2;}
.p-email{background:var(--bll);color:var(--bl);}
.p-li{background:var(--pul);color:var(--pu);}
.p-dk,.p-sms{background:var(--aml);color:var(--am);}
.p-mtg{background:var(--acl);color:var(--acd);}
.p-a{background:var(--acl);color:var(--acd);border:1px solid var(--acm);}
.p-b{background:var(--aml);color:var(--am);}
.p-c{background:var(--bg3);color:var(--tx2);}
.seg-a{color:var(--acd);font-weight:700;}
.seg-b{color:var(--am);font-weight:700;}
.seg-c{color:var(--tx3);font-weight:700;}
.btn{padding:8px 14px;border-radius:8px;font-size:12px;border:none;font-weight:600;transition:all .15s;}
.btn-p{background:var(--ac);color:#fff;}
.btn-p:hover{background:var(--acd);}
.btn-p:disabled{background:var(--bg3);color:var(--tx3);cursor:not-allowed;}
.btn-s{background:var(--bg);color:var(--tx);border:1px solid var(--bd2);}
.btn-s:hover{border-color:var(--ac);color:var(--acd);}
.btn-ok{background:var(--acl);color:var(--acd);border:1px solid var(--acm);}
.btn-ok:hover{background:var(--acm);}
.btn-ai{background:var(--pul);color:var(--pu);border:1px solid #ddd6fe;}
.btn-ai:hover{background:#ede9fe;}
.btn-rc{background:var(--rc);color:#fff;border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;transition:all .2s;}
.btn-rc:hover{background:#e55a00;}
.btn-rc:disabled{background:var(--bg3);color:var(--tx3);cursor:not-allowed;}
.btn-end{background:var(--rd);color:#fff;border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;}
.btn-end:hover{background:#b91c1c;}
.btn-sm{padding:4px 9px;font-size:11px;}
.sh2{font-family:'Libre Baskerville',Georgia,serif;font-size:19px;color:var(--tx);margin-bottom:3px;}
.sub{font-size:12px;color:var(--tx2);margin-bottom:14px;}
.fb{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.fr{display:flex;align-items:center;gap:8px;}
.fld{display:flex;flex-direction:column;gap:4px;}
.flbl{font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.7px;font-weight:700;}
.finp,.fsel{background:var(--bg);border:1px solid var(--bd2);border-radius:8px;color:var(--tx);padding:7px 9px;font-size:12px;outline:none;width:100%;}
.finp:focus,.fsel:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(30,158,94,.1);}
.ftxt{background:var(--bg);border:1px solid var(--bd2);border-radius:8px;color:var(--tx);padding:8px 10px;font-size:12px;outline:none;width:100%;resize:vertical;min-height:80px;line-height:1.55;}
.ftxt:focus{border-color:var(--ac);}
.aibadge{display:inline-flex;align-items:center;gap:4px;background:var(--pul);border:1px solid #ddd6fe;border-radius:20px;padding:2px 9px;font-size:10px;color:var(--pu);font-weight:600;}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:1000;display:flex;align-items:center;justify-content:center;}
.mbox{background:var(--bg);border:1px solid var(--bd);border-radius:14px;padding:20px;width:520px;max-width:95vw;box-shadow:0 20px 50px rgba(0,0,0,.12);max-height:90vh;overflow-y:auto;}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.mh h2{font-family:'Libre Baskerville',Georgia,serif;font-size:16px;}
.mc2{background:none;border:none;color:var(--tx2);font-size:17px;cursor:pointer;}
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg);border:1px solid var(--bd);border-left:3px solid var(--ac);border-radius:10px;padding:11px 16px;font-size:12px;color:var(--tx);z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.08);}
.toast.show{transform:translateY(0);opacity:1;}

/* LEAD PANEL */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.2);z-index:500;}
.panel{position:fixed;top:0;right:0;bottom:0;width:440px;background:var(--bg);border-left:1px solid var(--bd);z-index:501;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 30px rgba(0,0,0,.08);}
.panel.open{transform:translateX(0);}
.ph{padding:14px 16px;border-bottom:1px solid var(--bd);flex-shrink:0;}
.ph-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px;}
.ph-close{background:none;border:none;font-size:18px;color:var(--tx3);cursor:pointer;padding:2px;}
.ph-close:hover{color:var(--tx);}
.ph-name{font-family:'Libre Baskerville',Georgia,serif;font-size:17px;color:var(--tx);}
.ph-sub{font-size:12px;color:var(--tx2);margin-top:3px;}
.ph-actions{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.panel-body{flex:1;overflow-y:auto;padding:14px 16px;}
.psec{margin-bottom:16px;}
.psec-title{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:9px;display:flex;align-items:center;gap:6px;}
.psec-title::after{content:'';flex:1;height:1px;background:var(--bd);}

/* EDITABLE FIELD */
.ef{display:flex;flex-direction:column;gap:3px;padding:7px 9px;background:var(--bg2);border-radius:8px;border:1px solid transparent;cursor:text;transition:border-color .15s;}
.ef:hover{border-color:var(--bd2);}
.ef:focus-within{border-color:var(--ac);background:var(--bg);box-shadow:0 0 0 3px rgba(30,158,94,.08);}
.ef-lbl{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;}
.ef-inp{background:transparent;border:none;outline:none;color:var(--tx);font-size:12px;font-weight:500;width:100%;font-family:Arial,Helvetica,sans-serif;}
.ef-inp::placeholder{color:var(--tx3);font-weight:400;}
.ef-sel{background:transparent;border:none;outline:none;color:var(--tx);font-size:12px;font-weight:500;width:100%;font-family:Arial,Helvetica,sans-serif;cursor:pointer;}
.ef-ta{background:transparent;border:none;outline:none;color:var(--tx);font-size:12px;width:100%;resize:none;min-height:60px;line-height:1.55;font-family:Arial,Helvetica,sans-serif;}
.ef-ta::placeholder{color:var(--tx3);}
.eg2{display:grid;grid-template-columns:1fr 1fr;gap:7px;}

/* STATUS / SEG PILLS */
.spills{display:flex;gap:5px;flex-wrap:wrap;}
.spill{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;border:2px solid transparent;cursor:pointer;background:var(--bg2);color:var(--tx2);transition:all .15s;}
.spill:hover{border-color:var(--bd2);}
.spill.s-new.on{background:var(--bll);color:var(--bl);border-color:var(--bl);}
.spill.s-working.on{background:var(--aml);color:var(--am);border-color:var(--am);}
.spill.s-booked.on,.spill.s-customer.on{background:var(--acl);color:var(--acd);border-color:var(--acd);}
.spill.s-disq.on{background:var(--bg3);color:var(--tx2);border-color:var(--bd2);}
.segpills{display:flex;gap:5px;}
.segpill{padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700;border:2px solid transparent;cursor:pointer;background:var(--bg2);color:var(--tx2);}
.segpill.sa.on{background:var(--acl);color:var(--acd);border-color:var(--acd);}
.segpill.sb.on{background:var(--aml);color:var(--am);border-color:var(--am);}
.segpill.sc.on{background:var(--bg3);color:var(--tx2);border-color:var(--bd2);}

/* TIMELINE */
.tl-item{display:flex;gap:9px;padding-bottom:11px;position:relative;}
.tl-item::before{content:'';position:absolute;left:12px;top:24px;bottom:0;width:1px;background:var(--bd);}
.tl-item:last-child::before{display:none;}
.tl-dot{width:24px;height:24px;border-radius:50%;background:var(--bg2);border:1px solid var(--bd);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;z-index:1;}
.tl-dot.bk{background:var(--acl);border-color:var(--acm);}
.tl-dot.pos{background:var(--bll);border-color:var(--bl);}
.tl-body{flex:1;padding-top:3px;}
.tl-top{display:flex;align-items:center;gap:5px;margin-bottom:3px;flex-wrap:wrap;}
.tl-type{font-size:12px;font-weight:600;color:var(--tx);}
.tl-date{font-size:10px;color:var(--tx3);}
.tl-sc{font-size:10px;color:var(--pu);background:var(--pul);padding:1px 6px;border-radius:10px;}
.tl-note{font-size:11px;color:var(--tx2);margin-top:2px;}

/* DEAL IN PANEL */
.panel-deal{background:var(--acl);border:1px solid var(--acm);border-radius:9px;padding:10px 12px;}
.panel-deal-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid rgba(168,223,192,.5);}
.panel-deal-row:last-child{border-bottom:none;}

/* QUICK LOG */
.ql{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:12px;margin-bottom:14px;}
.ql-g{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px;}
.ql-fld{display:flex;flex-direction:column;gap:3px;}
.ql-lbl{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;}
.ql-s,.ql-i{background:var(--bg);border:1px solid var(--bd2);border-radius:7px;color:var(--tx);padding:5px 8px;font-size:11px;outline:none;width:100%;font-family:Arial,Helvetica,sans-serif;}
.ql-s:focus,.ql-i:focus{border-color:var(--ac);}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;flex:1;overflow:hidden;}
.chat-hdr{padding:14px 20px 11px;border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--bg);}
.chat-hdr h2{font-family:'Libre Baskerville',Georgia,serif;font-size:15px;color:var(--tx);}
.chat-hdr p{font-size:11px;color:var(--tx2);margin-top:2px;}
.chips{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap;}
.chip{background:var(--bg2);border:1px solid var(--bd2);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--tx2);cursor:pointer;font-weight:500;}
.chip:hover{border-color:var(--ac);color:var(--acd);background:var(--acl);}
.msgs{flex:1;overflow-y:auto;padding:14px 20px;display:flex;flex-direction:column;gap:10px;background:var(--bg2);}
.msg{display:flex;gap:9px;max-width:84%;}
.msg.u{align-self:flex-end;flex-direction:row-reverse;}
.msg.a{align-self:flex-start;}
.av{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;}
.av.ai{background:var(--acl);border:1px solid var(--acm);}
.av.u{background:var(--bg3);border:1px solid var(--bd2);}
.bub{padding:10px 13px;border-radius:13px;font-size:12px;line-height:1.55;}
.bub.ai{background:var(--bg);border:1px solid var(--bd);border-radius:13px 13px 13px 3px;color:var(--tx);}
.bub.u{background:var(--ac);border-radius:13px 13px 3px 13px;color:#fff;}
.lcard{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:9px 11px;margin-top:7px;min-width:200px;}
.lct{font-weight:700;color:var(--acd);margin-bottom:5px;font-size:11px;}
.lr{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--bd);}
.lr:last-child{border-bottom:none;}
.lk{color:var(--tx2);font-size:11px;}
.lv{color:var(--tx);font-weight:600;font-size:11px;}
.typing{display:flex;gap:4px;align-items:center;padding:3px 0;}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--tx3);animation:tb 1.2s infinite;display:block;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes tb{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
.inp-area{padding:12px 20px;border-top:1px solid var(--bd);background:var(--bg);flex-shrink:0;}
.inp-wrap{display:flex;gap:9px;align-items:flex-end;background:var(--bg2);border:1px solid var(--bd2);border-radius:11px;padding:8px 11px;transition:border-color .15s;}
.inp-wrap:focus-within{border-color:var(--ac);box-shadow:0 0 0 3px rgba(30,158,94,.1);}
.itx{flex:1;background:transparent;border:none;outline:none;color:var(--tx);font-size:13px;resize:none;min-height:22px;max-height:90px;line-height:1.45;font-family:Arial,Helvetica,sans-serif;}
.itx::placeholder{color:var(--tx3);}
.sbtn{background:var(--ac);border:none;border-radius:8px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:#fff;font-size:14px;}
.sbtn:hover{background:var(--acd);}
.sbtn:disabled{background:var(--bg3);color:var(--tx3);cursor:not-allowed;}
.ihint{font-size:10px;color:var(--tx3);margin-top:5px;text-align:center;}

/* KANBAN */
.kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
.kcol{background:var(--bg);border:1px solid var(--bd);border-radius:12px;padding:10px;min-height:100px;transition:background .15s;}
.kcol.dov{background:var(--acl);border-color:var(--acm);}
.kct{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--tx2);margin-bottom:9px;display:flex;align-items:center;justify-content:space-between;}
.kb{background:var(--bg2);border:1px solid var(--bd);border-radius:9px;padding:10px;margin-bottom:6px;cursor:grab;user-select:none;transition:all .15s;}
.kb:hover{border-color:var(--acm);background:var(--acl);}
.kb.dr{opacity:.35;}
.kbn{font-size:12px;font-weight:700;color:var(--tx);margin-bottom:2px;}
.kbs{font-size:10px;color:var(--tx2);}
.kba{font-size:11px;color:var(--acd);margin-top:5px;font-weight:700;}
.kbc{font-size:10px;color:var(--pu);margin-top:2px;}
.kbadge{background:var(--bg2);border:1px solid var(--bd);border-radius:20px;padding:1px 7px;font-size:10px;color:var(--tx3);font-weight:600;}

/* CADENCE */
.cd-row{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:9px 12px;margin-bottom:6px;}
.cd-name{min-width:150px;}
.cd-dots{display:flex;gap:4px;flex:1;}
.ddot{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;border:1.5px solid;transition:all .2s;position:relative;}
.dd-done{background:var(--acl);color:var(--acd);border-color:var(--acm);cursor:default;}
.dd-auto{background:var(--acl);color:var(--acd);border-color:var(--acd);cursor:default;}
.dd-manual{background:var(--acl);color:var(--acd);border-color:var(--acm);cursor:pointer;}
.dd-future{background:var(--bg2);color:var(--tx3);border-color:var(--bd);cursor:pointer;}
.dd-future:hover{background:var(--aml);color:var(--am);border-color:var(--am);}
.auto-pip{position:absolute;top:-3px;right:-3px;width:7px;height:7px;border-radius:50%;background:var(--acd);border:1.5px solid #fff;}

/* CSV IMPORT */
.uz{border:2px dashed var(--bd2);border-radius:14px;padding:48px 32px;text-align:center;cursor:pointer;transition:all .2s;position:relative;background:var(--bg);}
.uz:hover{border-color:var(--ac);background:var(--acl);}
.ai-proc{display:flex;align-items:center;gap:10px;background:var(--acl);border:1px solid var(--acm);border-radius:10px;padding:13px 16px;margin-bottom:13px;}
.spinner{width:17px;height:17px;border:2px solid var(--acm);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
.proc-bar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.proc-fill{height:100%;background:var(--ac);border-radius:2px;animation:pfill 1.2s ease-in-out infinite;}
@keyframes pfill{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}
.sbar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.sbox{background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;}

.call-lead.calling{border-color:var(--rd);animation:pulse-border 1.5s ease-in-out infinite;}

.call-lead.done{border-color:var(--acm);background:var(--acl);opacity:.75;}

.csd-ring{background:var(--rd);animation:blink 1s infinite;}

.csd-done{background:var(--acm);}

function EF({label,value,onChange,type='text',opts,full,placeholder,mono}){
  if(type==='select') return h('div',{className:'ef'+(full?' full':'')},
    h('div',{className:'ef-lbl'},label),
    h('select',{className:'ef-sel',value:value||'',onChange:e=>onChange(e.target.value)},
      h('option',{value:''},placeholder||'—'),
      ...(opts||[]).map(o=>h('option',{key:o,value:o},o))
    )
  );
  if(type==='textarea') return h('div',{className:'ef'+(full?' full':'')},
    h('div',{className:'ef-lbl'},label),
    h('textarea',{className:'ef-ta',value:value||'',onChange:e=>onChange(e.target.value),placeholder:placeholder||'Click to add...',rows:3})
  );
  return h('div',{className:'ef'+(full?' full':'')},
    h('div',{className:'ef-lbl'},label),
    h('input',{className:'ef-inp',type:'text',value:value||'',onChange:e=>onChange(e.target.value),placeholder:placeholder||'Click to edit...',style:mono?{fontFamily:"'Courier New',monospace"}:{}})
  );
}

// ─────────────────────────────────────────
// AI LOGGER
// ─────────────────────────────────────────
const CHIPS=[{l:'📞 Called, no answer',t:'Used cold call opener A on Michael Quinn, no answer. Day 1.'},{l:'📧 Day 1 email sent',t:'Sent day 1 cold email to Declan Farrell.'},{l:'💼 LinkedIn DM',t:'Sent LinkedIn connection note to Paul McVey.'},{l:'🤝 Booked meeting',t:'Booked on-site with Sarah Brennan for Thursday 2pm.'},{l:'🚪 Door knocked',t:"Door knocked at Quinn Electrical, receptionist took my card."},{l:'💰 Deal closed!',t:'Brennan Recruitment just signed, £6,900 PIF. Deal won!'}];

function AILogger({db,upd,toast,onLeadOpen}){
  const [msgs,setMsgs]=useState([{role:'ai',text:"Hey! 👋 I'm your AI sales logger.\n\nTell me what happened — I'll log the activity, match the script, and open the lead card automatically.\n\nExamples:\n• \"Used opener A on Michael Quinn, no answer. Day 1.\"\n• \"Sent day 1 email to Declan, positive reply!\"\n• \"Brennan Recruitment signed — £6,900 PIF!\"\n\nWhat just happened? 🎯"}]);
  const [inp,setInp]=useState('');
  const [busy,setBusy]=useState(false);
  const ref=useRef(null); const inpRef=useRef(null);
  const tc=db.activities.filter(a=>a.loggedAt===TODAY()).length;
  useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight;},[msgs]);

  async function send(text){
    const t=(text||inp).trim(); if(!t||busy)return;
    setInp(''); setBusy(true);
    setMsgs(p=>[...p,{role:'user',text:t},{role:'ai',text:'...'}]);
    try{
      const lctx=db.leads.map(l=>`ID:${l.id}|${l.name}|${l.company}|Seg:${l.seg}|Status:${l.status}`).join('\n');
      const sctx=db.scripts.filter(s=>s.active).map(s=>`ID:${s.id}|${s.name}|Channel:${s.channel}`).join('\n');
      const sys=`You are an AI sales logger for a Belfast creative video agency (${FMT(DEAL_AMOUNT)} packages, ${COMM_RATE*100}% commission).\nLEADS:\n${lctx}\nACTIVE SCRIPTS:\n${sctx}\nTODAY: ${TODAY()}\nReply ONLY valid JSON:\n{"reply":"friendly reply with emojis","actions":[{"type":"log_activity"|"update_lead_status"|"create_deal"|"add_lead"|"none","data":{...}}]}\nlog_activity:{leadId,leadName,activityType:"Call"|"Voicemail"|"Email"|"LinkedIn"|"Text"|"Door Knock"|"Meeting",outcome:"No answer"|"Left voicemail"|"Spoke – follow-up"|"Spoke – not interested"|"Booked meeting"|"Positive reply"|"No-show"|"Showed",scriptId,cadenceDay:1-14,note}\nupdate_lead_status:{leadId,newStatus}\ncreate_deal:{company,leadName,leadId,stage,amount:${DEAL_AMOUNT},terms:"PIF"|"50/50",closeDate,closer:"BDO"}\nadd_lead:{name,company,role,phone,email,seg,source}\nMention commission when deal created.`;
      const history=[...(db.chatHistory||[]).slice(-8),{role:'user',content:t}];
      const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:history,leads:db.leads,scripts:db.scripts,system:sys})});
      const data=await res.json();
      const raw=data.content?.[0]?.text||'{}';
      let parsed; try{parsed=JSON.parse(raw);}catch{parsed={reply:raw,actions:[]};}
      const cards=[]; let affectedId=null;
      upd(prev=>{
        const n={...prev,leads:[...prev.leads],activities:[...prev.activities],deals:[...prev.deals]};
        for(const a of(parsed.actions||[])){
          if(a.type==='log_activity'&&a.data){
            const act={id:Date.now()+Math.random(),leadId:a.data.leadId,leadName:a.data.leadName||'Unknown',type:a.data.activityType||'Call',outcome:a.data.outcome||'No answer',scriptId:a.data.scriptId||null,day:a.data.cadenceDay||1,note:a.data.note||'',loggedAt:TODAY()};
            n.activities.push(act); affectedId=act.leadId;
            const sc=prev.scripts.find(s=>s.id===act.scriptId);
            cards.push({action:'Activity logged',details:{Lead:act.leadName,Type:act.type,Outcome:act.outcome,Script:sc?sc.name.split('—')[0].trim():'—',Day:'Day '+act.day}});
            if(act.outcome==='Booked meeting'){const l=n.leads.find(x=>x.id===act.leadId);if(l)l.status='Meeting booked';}
            const key=`${act.leadId}_${act.day}`; n.manualDays={...(n.manualDays||{}),[key]:true};
          }
          if(a.type==='update_lead_status'&&a.data){const l=n.leads.find(x=>x.id===a.data.leadId);if(l){affectedId=l.id;const old=l.status;l.status=a.data.newStatus;cards.push({action:'Status updated',details:{Lead:l.name,From:old,To:l.status}});}}
          if(a.type==='create_deal'&&a.data){const d=a.data;const deal={id:Date.now(),company:d.company,leadId:d.leadId,leadName:d.leadName||'',stage:d.stage||'Won',amount:d.amount||DEAL_AMOUNT,terms:d.terms||'PIF',closeDate:d.closeDate||TODAY(),closer:d.closer||'BDO',commRate:COMM_RATE,paid:false};n.deals.push(deal);if(d.leadId){affectedId=d.leadId;const l=n.leads.find(x=>x.id===d.leadId);if(l)l.status='Customer';}cards.push({action:'🏆 Deal created',details:{Company:deal.company,Stage:deal.stage,Amount:FMT(deal.amount),Commission:FMT(deal.amount*COMM_RATE),Closer:deal.closer}});}
          if(a.type==='add_lead'&&a.data){const d=a.data;const l={id:Date.now(),name:d.name,company:d.company,role:d.role||'',phone:d.phone||'',email:d.email||'',linkedin:'',address:'',website:'',industry:'',revenue:'',employees:'',seg:d.seg||'B',source:d.source||'Scraped list',status:'New',createdAt:TODAY(),notes:''};n.leads.push(l);affectedId=l.id;cards.push({action:'👤 Lead added',details:{Name:l.name,Company:l.company,Segment:l.seg}});}
        }
        n.chatHistory=[...(prev.chatHistory||[]),{role:'user',content:t},{role:'assistant',content:raw}].slice(-20);

    h('div',{className:'fb'},h('div',null,h('div',{className:'sh2'},'Import Leads 📥'),h('div',{className:'sub'},'Drop any CSV — AI maps columns and segments A/B/C automatically')),h('span',{className:'aibadge'},'✨ AI-powered')),
