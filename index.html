<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Like Media — Sales OS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fff;--bg2:#f7f8f5;--bg3:#f0f2ed;
  --bd:#e4e8df;--bd2:#cdd4c6;
  --tx:#1a1f17;--tx2:#5a6654;--tx3:#9aa890;
  --ac:#1e9e5e;--acl:#e8f7ef;--acm:#a8dfc0;--acd:#157a48;
  --am:#d97706;--aml:#fef3c7;
  --rd:#dc2626;--rdl:#fee2e2;
  --bl:#2563eb;--bll:#eff6ff;
  --pu:#7c3aed;--pul:#f5f3ff;
  --rc:#ff6600;--rcl:#fff3eb;
}
html,body{height:100%;background:var(--bg2);color:var(--tx);font-family:Arial,Helvetica,sans-serif;font-size:13px;}
h1,h2,h3{font-family:"Libre Baskerville",Georgia,serif;}
button{cursor:pointer;font-family:Arial,Helvetica,sans-serif;}
input,select,textarea{font-family:Arial,Helvetica,sans-serif;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg3);}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px;}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.nav{display:flex;align-items:center;padding:0 24px;height:56px;border-bottom:1px solid var(--bd);background:var(--bg);flex-shrink:0;gap:32px;}
.logo{font-family:"Libre Baskerville",Georgia,serif;font-size:17px;font-weight:700;color:var(--tx);letter-spacing:-.3px;white-space:nowrap;flex-shrink:0;}
.logo span{color:var(--ac);}
.nav-tabs{display:flex;gap:2px;flex:1;}
.tab{padding:6px 14px;border-radius:8px;font-size:12px;color:var(--tx2);border:none;background:transparent;font-weight:500;transition:all .15s;white-space:nowrap;}
.tab:hover{background:var(--bg2);color:var(--tx);}
.tab.on{background:var(--acl);color:var(--acd);border:1px solid var(--acm);font-weight:600;}
.tab.rc.on{background:var(--rcl);color:var(--rc);border-color:var(--rc);}
.nav-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.live-badge{background:var(--acl);color:var(--acd);font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid var(--acm);font-weight:600;}
.gear-btn{background:none;border:none;font-size:18px;color:var(--tx3);cursor:pointer;padding:4px;border-radius:6px;}
.gear-btn:hover{background:var(--bg2);color:var(--tx);}
.content{flex:1;overflow-y:auto;padding:22px;background:var(--bg2);}
.chat-outer{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* ── SHARED COMPONENTS ── */
.card{background:var(--bg);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:13px;}
.ct{font-size:13px;font-weight:700;color:var(--tx);display:flex;align-items:center;gap:6px;margin-bottom:12px;}
.mg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.mc{background:var(--bg);border:1px solid var(--bd);border-radius:12px;padding:13px 15px;}
.ml{font-size:11px;color:var(--tx2);margin-bottom:4px;font-weight:500;}
.mv{font-family:"Libre Baskerville",Georgia,serif;font-size:23px;color:var(--tx);line-height:1;}
.ms{font-size:11px;color:var(--tx3);margin-top:3px;}.ms.up{color:var(--ac);}.ms.wn{color:var(--am);}
.pb{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:6px;}
.pf{height:100%;border-radius:3px;background:var(--ac);}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.p-prospect{background:#f0f9ff;color:#0369a1;}
.p-contacted{background:var(--aml);color:var(--am);}
.p-booked{background:var(--acl);color:var(--acd);}
.p-onsite{background:var(--pul);color:var(--pu);}
.p-proposal{background:#fdf4ff;color:#9333ea;}
.p-won{background:var(--acl);color:var(--acd);border:1px solid var(--acm);}
.p-lost{background:var(--rdl);color:var(--rd);}
.p-call{background:#ecfeff;color:#0891b2;}
.p-email{background:var(--bll);color:var(--bl);}
.p-li{background:var(--pul);color:var(--pu);}
.p-dk,.p-sms{background:var(--aml);color:var(--am);}
.p-a{background:var(--acl);color:var(--acd);border:1px solid var(--acm);}
.p-b{background:var(--aml);color:var(--am);}
.p-c{background:var(--bg3);color:var(--tx2);}
.p-dup{background:var(--rdl);color:var(--rd);}
.seg-a{color:var(--acd);font-weight:700;}.seg-b{color:var(--am);font-weight:700;}.seg-c{color:var(--tx3);font-weight:700;}
.btn{padding:8px 14px;border-radius:8px;font-size:12px;border:none;font-weight:600;transition:all .15s;}
.btn-p{background:var(--ac);color:#fff;}.btn-p:hover{background:var(--acd);}
.btn-p:disabled{background:var(--bg3);color:var(--tx3);cursor:not-allowed;}
.btn-s{background:var(--bg);color:var(--tx);border:1px solid var(--bd2);}.btn-s:hover{border-color:var(--ac);color:var(--acd);}
.btn-ok{background:var(--acl);color:var(--acd);border:1px solid var(--acm);}
.btn-ai{background:var(--pul);color:var(--pu);border:1px solid #ddd6fe;}
.btn-rc{background:var(--rc);color:#fff;border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;}
.btn-rc:hover{background:#e55a00;}.btn-rc:disabled{background:var(--bg3);color:var(--tx3);cursor:not-allowed;}
.btn-end{background:var(--rd);color:#fff;border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;}
.btn-sm{padding:4px 9px;font-size:11px;}
.sh2{font-family:"Libre Baskerville",Georgia,serif;font-size:19px;color:var(--tx);margin-bottom:3px;}
.sub{font-size:12px;color:var(--tx2);margin-bottom:14px;}
.fb{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.fr{display:flex;align-items:center;gap:8px;}
.fld{display:flex;flex-direction:column;gap:4px;}
.flbl{font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.7px;font-weight:700;}
.finp,.fsel{background:var(--bg);border:1px solid var(--bd2);border-radius:8px;color:var(--tx);padding:7px 9px;font-size:12px;outline:none;width:100%;}
.finp:focus,.fsel:focus{border-color:var(--ac);}
.ftxt{background:var(--bg);border:1px solid var(--bd2);border-radius:8px;color:var(--tx);padding:8px 10px;font-size:12px;outline:none;width:100%;resize:vertical;min-height:80px;line-height:1.55;}
.ftxt:focus{border-color:var(--ac);}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:1000;display:flex;align-items:center;justify-content:center;}
.mbox{background:var(--bg);border:1px solid var(--bd);border-radius:14px;padding:20px;width:520px;max-width:95vw;box-shadow:0 20px 50px rgba(0,0,0,.12);max-height:90vh;overflow-y:auto;}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.mh h2{font-family:"Libre Baskerville",Georgia,serif;font-size:16px;}
.mc2{background:none;border:none;color:var(--tx2);font-size:17px;cursor:pointer;}
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg);border:1px solid var(--bd);border-left:3px solid var(--ac);border-radius:10px;padding:11px 16px;font-size:12px;color:var(--tx);z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}
.aibadge{display:inline-flex;align-items:center;gap:4px;background:var(--pul);border:1px solid #ddd6fe;border-radius:20px;padding:2px 9px;font-size:10px;color:var(--pu);font-weight:600;}

/* ── LEAD PANEL ── */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.2);z-index:500;}
.panel{position:fixed;top:0;right:0;bottom:0;width:460px;background:var(--bg);border-left:1px solid var(--bd);z-index:501;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 30px rgba(0,0,0,.08);}
.panel.open{transform:translateX(0);}
.ph{padding:16px 18px;border-bottom:1px solid var(--bd);flex-shrink:0;}
.ph-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px;}
.ph-close{background:none;border:none;font-size:18px;color:var(--tx3);cursor:pointer;}
.ph-close:hover{color:var(--tx);}
.ph-name{font-family:"Libre Baskerville",Georgia,serif;font-size:18px;color:var(--tx);}
.ph-sub{font-size:12px;color:var(--tx2);margin-top:3px;}
.ph-actions{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.panel-body{flex:1;overflow-y:auto;padding:16px 18px;}
.psec{margin-bottom:18px;}
.psec-title{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:9px;display:flex;align-items:center;gap:6px;}
.psec-title::after{content:"";flex:1;height:1px;background:var(--bd);}
.ef{display:flex;flex-direction:column;gap:3px;padding:7px 9px;background:var(--bg2);border-radius:8px;border:1px solid transparent;cursor:text;transition:border-color .15s;}
.ef:hover{border-color:var(--bd2);}.ef:focus-within{border-color:var(--ac);background:var(--bg);}
.ef-lbl{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;}
.ef-inp{background:transparent;border:none;outline:none;color:var(--tx);font-size:12px;font-weight:500;width:100%;font-family:Arial,Helvetica,sans-serif;}
.ef-inp::placeholder{color:var(--tx3);font-weight:400;}
.ef-sel{background:transparent;border:none;outline:none;color:var(--tx);font-size:12px;font-weight:500;width:100%;font-family:Arial,Helvetica,sans-serif;cursor:pointer;}
.ef-ta{background:transparent;border:none;outline:none;color:var(--tx);font-size:12px;width:100%;resize:none;min-height:60px;line-height:1.55;font-family:Arial,Helvetica,sans-serif;}
.ef-ta::placeholder{color:var(--tx3);}
.eg2{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.spills{display:flex;gap:5px;flex-wrap:wrap;}
.spill{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;border:2px solid transparent;cursor:pointer;background:var(--bg2);color:var(--tx2);transition:all .15s;}
.spill.s-prospect.on{background:#f0f9ff;color:#0369a1;border-color:#0369a1;}
.spill.s-contacted.on{background:var(--aml);color:var(--am);border-color:var(--am);}
.spill.s-booked.on{background:var(--acl);color:var(--acd);border-color:var(--acd);}
.spill.s-onsite.on{background:var(--pul);color:var(--pu);border-color:var(--pu);}
.spill.s-proposal.on{background:#fdf4ff;color:#9333ea;border-color:#9333ea;}
.spill.s-won.on{background:var(--acl);color:var(--acd);border-color:var(--acd);}
.spill.s-lost.on{background:var(--rdl);color:var(--rd);border-color:var(--rd);}
.segpills{display:flex;gap:5px;}
.segpill{padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700;border:2px solid transparent;cursor:pointer;background:var(--bg2);color:var(--tx2);}
.segpill.sa.on{background:var(--acl);color:var(--acd);border-color:var(--acd);}
.segpill.sb.on{background:var(--aml);color:var(--am);border-color:var(--am);}
.segpill.sc.on{background:var(--bg3);color:var(--tx2);border-color:var(--bd2);}

/* CADENCE DOTS IN PANEL */
.cad-dots{display:flex;gap:5px;flex-wrap:wrap;}
.cad-dot{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:1.5px solid;transition:all .2s;position:relative;cursor:pointer;}
.cad-dot.done{background:var(--acl);color:var(--acd);border-color:var(--acm);}
.cad-dot.auto{background:var(--acl);color:var(--acd);border-color:var(--acd);}
.cad-dot.future{background:var(--bg2);color:var(--tx3);border-color:var(--bd);}
.cad-dot.future:hover{background:var(--aml);color:var(--am);border-color:var(--am);}
.auto-pip{position:absolute;top:-3px;right:-3px;width:7px;height:7px;border-radius:50%;background:var(--acd);border:1.5px solid #fff;}

/* TIMELINE */
.tl-item{display:flex;gap:9px;padding-bottom:11px;position:relative;}
.tl-item::before{content:"";position:absolute;left:12px;top:24px;bottom:0;width:1px;background:var(--bd);}
.tl-item:last-child::before{display:none;}
.tl-dot{width:24px;height:24px;border-radius:50%;background:var(--bg2);border:1px solid var(--bd);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;z-index:1;}
.tl-dot.bk{background:var(--acl);border-color:var(--acm);}.tl-dot.pos{background:var(--bll);border-color:var(--bl);}
.tl-body{flex:1;padding-top:3px;}
.tl-top{display:flex;align-items:center;gap:5px;margin-bottom:3px;flex-wrap:wrap;}
.tl-type{font-size:12px;font-weight:600;color:var(--tx);}
.tl-date{font-size:10px;color:var(--tx3);}
.tl-sc{font-size:10px;color:var(--pu);background:var(--pul);padding:1px 6px;border-radius:10px;}
.tl-note{font-size:11px;color:var(--tx2);margin-top:2px;}

/* QUICK LOG */
.ql{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:12px;margin-bottom:14px;}
.ql-g{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px;}
.ql-fld{display:flex;flex-direction:column;gap:3px;}
.ql-lbl{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;}
.ql-s,.ql-i{background:var(--bg);border:1px solid var(--bd2);border-radius:7px;color:var(--tx);padding:5px 8px;font-size:11px;outline:none;width:100%;font-family:Arial,Helvetica,sans-serif;}

/* PIPELINE KANBAN */
.kanban{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;min-height:calc(100vh - 180px);}
.kcol{background:var(--bg);border:1px solid var(--bd);border-radius:12px;padding:11px;min-width:200px;flex:1;display:flex;flex-direction:column;transition:background .15s;}
.kcol.dov{background:var(--acl);border-color:var(--acm);}
.kct{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--tx2);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.kcol-cards{flex:1;overflow-y:auto;}
.kb{background:var(--bg2);border:1px solid var(--bd);border-radius:9px;padding:10px;margin-bottom:7px;cursor:pointer;transition:all .15s;user-select:none;}
.kb:hover{border-color:var(--acm);background:var(--acl);box-shadow:0 2px 8px rgba(30,158,94,.1);}
.kb.dragging{opacity:.35;cursor:grabbing;}
.kbn{font-size:12px;font-weight:700;color:var(--tx);margin-bottom:2px;}
.kbs{font-size:10px;color:var(--tx2);}
.kba{font-size:11px;color:var(--acd);margin-top:5px;font-weight:700;}
.kbc{font-size:10px;color:var(--pu);margin-top:2px;}
.kbadge{background:var(--bg2);border:1px solid var(--bd);border-radius:20px;padding:1px 7px;font-size:10px;color:var(--tx3);font-weight:600;}
.k-add{border:2px dashed var(--bd2);border-radius:9px;padding:10px;text-align:center;font-size:11px;color:var(--tx3);cursor:pointer;transition:all .15s;margin-top:4px;}
.k-add:hover{border-color:var(--ac);color:var(--acd);background:var(--acl);}

/* CSV IMPORT */
.uz{border:2px dashed var(--bd2);border-radius:14px;padding:48px 32px;text-align:center;cursor:pointer;transition:all .2s;position:relative;background:var(--bg);}
.uz:hover{border-color:var(--ac);background:var(--acl);}
.ai-proc{display:flex;align-items:center;gap:10px;background:var(--acl);border:1px solid var(--acm);border-radius:10px;padding:13px 16px;margin-bottom:13px;}
.spinner{width:17px;height:17px;border:2px solid var(--acm);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
.proc-bar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.proc-fill{height:100%;background:var(--ac);border-radius:2px;animation:pf 1.2s ease-in-out infinite;}
@keyframes pf{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}
.sbar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.sbox{background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;}
.sbl{font-size:11px;color:var(--tx2);margin-bottom:3px;font-weight:500;}
.sbv{font-family:"Libre Baskerville",Georgia,serif;font-size:22px;color:var(--tx);}
.sbv.g{color:var(--acd);}.sbv.am{color:var(--am);}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;flex:1;overflow:hidden;}
.chat-hdr{padding:14px 22px 11px;border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--bg);}
.chat-hdr h2{font-family:"Libre Baskerville",Georgia,serif;font-size:15px;color:var(--tx);}
.chat-hdr p{font-size:11px;color:var(--tx2);margin-top:2px;}
.chips{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap;}
.chip{background:var(--bg2);border:1px solid var(--bd2);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--tx2);cursor:pointer;}
.chip:hover{border-color:var(--ac);color:var(--acd);background:var(--acl);}
.msgs{flex:1;overflow-y:auto;padding:14px 22px;display:flex;flex-direction:column;gap:10px;background:var(--bg2);}
.msg{display:flex;gap:9px;max-width:84%;}
.msg.u{align-self:flex-end;flex-direction:row-reverse;}
.msg.a{align-self:flex-start;}
.av{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;}
.av.ai{background:var(--acl);border:1px solid var(--acm);}
.av.u{background:var(--bg3);border:1px solid var(--bd2);}
.bub{padding:10px 13px;border-radius:13px;font-size:12px;line-height:1.55;}
.bub.ai{background:var(--bg);border:1px solid var(--bd);border-radius:13px 13px 13px 3px;color:var(--tx);}
.bub.u{background:var(--ac);border-radius:13px 13px 3px 13px;color:#fff;}
.lcard{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:9px 11px;margin-top:7px;min-width:200px;}
.lct{font-weight:700;color:var(--acd);margin-bottom:5px;font-size:11px;}
.lr{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--bd);}
.lr:last-child{border-bottom:none;}
.lk{color:var(--tx2);font-size:11px;}.lv{color:var(--tx);font-weight:600;font-size:11px;}
.typing{display:flex;gap:4px;align-items:center;padding:3px 0;}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--tx3);animation:tb 1.2s infinite;display:block;}
.typing span:nth-child(2){animation-delay:.2s;}.typing span:nth-child(3){animation-delay:.4s;}
@keyframes tb{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
.inp-area{padding:12px 22px;border-top:1px solid var(--bd);background:var(--bg);flex-shrink:0;}
.inp-wrap{display:flex;gap:9px;align-items:flex-end;background:var(--bg2);border:1px solid var(--bd2);border-radius:11px;padding:8px 11px;transition:border-color .15s;}
.inp-wrap:focus-within{border-color:var(--ac);}
.itx{flex:1;background:transparent;border:none;outline:none;color:var(--tx);font-size:13px;resize:none;min-height:22px;max-height:90px;line-height:1.45;font-family:Arial,Helvetica,sans-serif;}
.itx::placeholder{color:var(--tx3);}
.sbtn{background:var(--ac);border:none;border-radius:8px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:#fff;font-size:14px;}
.sbtn:hover{background:var(--acd);}.sbtn:disabled{background:var(--bg3);color:var(--tx3);cursor:not-allowed;}
.ihint{font-size:10px;color:var(--tx3);margin-top:5px;text-align:center;}

/* CALL CENTRAL */
.call-layout{display:grid;grid-template-columns:1fr 360px;gap:14px;}
.call-lead{background:var(--bg);border:1px solid var(--bd);border-radius:11px;padding:11px 14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px;margin-bottom:7px;}
.call-lead:hover{border-color:var(--bd2);box-shadow:0 2px 8px rgba(0,0,0,.06);}

function lev(a,b){const m=a.length,n=b.length,dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i||j));for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);return dp[m][n];}
function normalisePhone(p){
  if(!p) return "";
  let n=p.replace(/[^\d]/g,""); // strip all non-digits
  if(n.startsWith("00")) n=n.slice(2); // 0044... → 44...
  if(n.startsWith("44")) n=n.slice(2); // 44... → local digits
  if(!n.startsWith("0")) n="0"+n;       // ensure leading 0
  return n;
}

function normalisePhoneE164(p){
  // E.164 version for RingCentral API calls
  let n=normalisePhone(p);
  if(n.startsWith("0")) n="+44"+n.slice(1);
  return n;
}

      return n;

    const auto=db.activities.some(a=>a.leadId===lead.id&&Number(a.day)===day);

    return{done:auto||manual,auto,manual:manual&&!auto};

function App(){
  const [session,setSession]=useState(undefined); // undefined=loading, null=logged out
  const [role,setRole]=useState(null);
  const [view,setView]=useState("daily");
  const [db,setDB]=useState(()=>({leads:[],activities:[],scripts:DEFAULT_SCRIPTS,manualDays:{},chatHistory:[]}));
  const [keys,setKeys]=useState(()=>loadKeys());
  const [toast,setToast]=useState({msg:"",show:false});
  const [openLead,setOpenLead]=useState(null);
  const [showSettings,setShowSettings]=useState(false);
  const [showImport,setShowImport]=useState(false);
  const [dbLoading,setDbLoading]=useState(true);

  const shT=useCallback(msg=>{setToast({msg,show:true});setTimeout(()=>setToast(t=>({...t,show:false})),2800);},[]);

  // Check session on mount
  useEffect(()=>{
    supa.auth.getSession().then(({data:{session}})=>{
      setSession(session);
      if(session) loadUserData(session);
    });
    const {data:{subscription}}=supa.auth.onAuthStateChange((_,session)=>{
      setSession(session);
      if(session) loadUserData(session);
      else{setRole(null);setDB({leads:[],activities:[],scripts:DEFAULT_SCRIPTS,manualDays:{},chatHistory:[]});}
    });
    return()=>subscription.unsubscribe();
  },[]);

  async function loadUserData(sess){
    setDbLoading(true);
    try{
      // Get role
      const {data:settings}=await supa.from("user_settings").select("*").eq("user_id",sess.user.id).single();
      setRole(settings?.role||"bdo");
      if(settings){setKeys(k=>({...k,...settings}));}

      // Load leads
      const {data:leads}=await supa.from("leads").select("*").order("created_at",{ascending:false});
      // Load activities
      const {data:activities}=await supa.from("activities").select("*").order("created_at",{ascending:false});
      // Load scripts
      const {data:scripts}=await supa.from("scripts").select("*");
      // Load manual days
      const {data:manualDays}=await supa.from("manual_days").select("*");

      const manualDaysObj={};
      (manualDays||[]).forEach(m=>{manualDaysObj[m.lead_id+"_"+m.day]=true;});

      setDB({
        leads:(leads||[]).map(dbToLead),
        activities:(activities||[]).map(dbToActivity),
        scripts:scripts&&scripts.length>0?scripts:DEFAULT_SCRIPTS,
        manualDays:manualDaysObj,
        chatHistory:[]
      });
    }catch(e){console.error("Load error",e);shT("Error loading data");}
    setDbLoading(false);
  }

  // Convert DB row to app format
  function dbToLead(r){return{id:r.id,name:r.name||"",company:r.company||"",role:r.role||"",phone:r.phone||"",email:r.email||"",linkedin:r.linkedin||"",address:r.address||"",website:r.website||"",industry:r.industry||"",revenue:r.revenue||"",employees:r.employees||"",seg:r.seg||"B",source:r.source||"",stage:r.stage||"Prospecting",dealAmount:r.deal_amount,dealTerms:r.deal_terms,depositAmount:r.deposit_amount,wonAt:r.won_at,postcode:r.postcode||"",instagram:r.instagram||"",facebook:r.facebook||"",twitter:r.twitter||"",owner:r.owner||"",notes:r.notes||"",createdAt:r.created_at?.split("T")[0]||TODAY()};}
  function dbToActivity(r){return{id:r.id,leadId:r.lead_id,leadName:r.lead_name||"",type:r.type||"Call",outcome:r.outcome||"",scriptId:r.script_id,day:r.day||1,note:r.note||"",loggedAt:r.logged_at||TODAY()};}

  // Save lead to Supabase
  async function saveLead(lead){
    const row={name:lead.name,company:lead.company,role:lead.role,phone:lead.phone,email:lead.email,linkedin:lead.linkedin,address:lead.address,postcode:lead.postcode||null,website:lead.website,instagram:lead.instagram||null,facebook:lead.facebook||null,twitter:lead.twitter||null,industry:lead.industry,revenue:lead.revenue,employees:lead.employees,seg:lead.seg,source:lead.source,stage:lead.stage,owner:lead.owner||null,deal_amount:lead.dealAmount||null,deal_terms:lead.dealTerms||null,deposit_amount:lead.depositAmount||null,won_at:lead.wonAt||null,notes:lead.notes};
    if(lead.id&&typeof lead.id==="string"&&lead.id.includes("-")){
      await supa.from("leads").update(row).eq("id",lead.id);
    } else {
      const {data}=await supa.from("leads").insert(row).select().single();
      return data?.id;
    }
    return lead.id;
  }

  // Save activity to Supabase
  async function saveActivity(act){
    await supa.from("activities").insert({lead_id:act.leadId,lead_name:act.leadName,type:act.type,outcome:act.outcome,script_id:act.scriptId||null,day:act.day,note:act.note||"",logged_at:act.loggedAt});
  }

  // upd function - updates local state and syncs to Supabase
  const upd=useCallback(fn=>{
    setDB(prev=>{
      const next=fn(prev);
      // Find changed leads and sync
      next.leads.forEach(l=>{
        const old=prev.leads.find(x=>x.id===l.id);
        if(!old||JSON.stringify(old)!==JSON.stringify(l)) saveLead(l);
      });
      // Find new leads
      next.leads.filter(l=>!prev.leads.find(x=>x.id===l.id)).forEach(async l=>{
        const newId=await saveLead(l);
        if(newId&&newId!==l.id){setDB(p=>({...p,leads:p.leads.map(x=>x.id===l.id?{...x,id:newId}:x)}));}
      });
      // Find new activities
      next.activities.filter(a=>!prev.activities.find(x=>x.id===a.id)).forEach(a=>saveActivity(a));
      // Find new/changed manual days
      Object.keys(next.manualDays||{}).forEach(async k=>{
        if(!(prev.manualDays||{})[k]){
          const [leadId,day]=k.split("_");
          await supa.from("manual_days").insert({lead_id:leadId,day:parseInt(day)}).onConflict("lead_id,day").ignore();
        }
      });
      Object.keys(prev.manualDays||{}).forEach(async k=>{
        if(!(next.manualDays||{})[k]){
          const [leadId,day]=k.split("_");
          await supa.from("manual_days").delete().eq("lead_id",leadId).eq("day",parseInt(day));
        }
      });
      return next;
    });
  },[]);

  const saveKeys=useCallback(async k=>{
    setKeys(k);
    try{localStorage.setItem("sos_keys_v1",JSON.stringify(k));}catch(e){}
    if(session){await supa.from("user_settings").update({target_actions:k.targetActions,target_meetings:k.targetMeetings,target_deals:k.targetDeals,target_revenue:k.targetRevenue,rc_client_id:k.rcClientId||null,rc_jwt:k.rcJwt||null,ff_api_key:k.ffApiKey||null}).eq("user_id",session.user.id);}
  },[session]);

  async function logout(){await supa.auth.signOut();setSession(null);setRole(null);}

  // Real-time subscription
  useEffect(()=>{
    if(!session)return;
    const ch=supa.channel("db-changes")
      .on("postgres_changes",{event:"*",schema:"public",table:"leads"},()=>loadUserData(session))
      .on("postgres_changes",{event:"*",schema:"public",table:"activities"},()=>loadUserData(session))
      .subscribe();
    return()=>supa.removeChannel(ch);
  },[session]);

  const currentLead=openLead?db.leads.find(l=>l.id===openLead):null;

  // Role-based nav
  const NAV=role==="founder"
    ?[["daily","📋 Daily"],["chat","💬 AI Logger"],["pipeline","💼 Pipeline"],["report","📊 Report"]]
    :[["daily","📋 Daily"],["chat","💬 AI Logger"],["pipeline","💼 Pipeline"]];

  // Loading state
  if(session===undefined) return h("div",{className:"login-wrap"},h("div",{style:{color:"var(--tx3)",fontSize:13}},"Loading..."));

  // Not logged in
  if(!session) return h(LoginScreen,{onLogin:s=>{setSession(s);loadUserData(s);}});

  // Loading data
  if(dbLoading) return h("div",{className:"login-wrap"},h("div",{style:{textAlign:"center"}},h("div",{style:{fontFamily:"'Libre Baskerville',Georgia,serif",fontSize:18,color:"var(--tx)",marginBottom:8}},"Life Like ",h("span",{style:{color:"var(--ac)"}},"Media")),h("div",{style:{color:"var(--tx3)",fontSize:13}},"Loading your data...")));

  return h("div",{className:"app"},
    h("nav",{className:"nav"},
      h("div",{className:"logo"},"Life Like ",h("span",null,"Media")),
      h("div",{className:"nav-tabs"},NAV.map(([id,lbl])=>h("button",{key:id,className:"tab"+(view===id?" on":"")+(id==="callcentral"?" rc":""),onClick:()=>setView(id)},lbl))),
      h("div",{className:"nav-right"},
        h("div",{className:"user-badge"},h("div",{className:"user-dot"}),session.user.email.split("@")[0]),
        role==="founder"&&h("span",{className:"live-badge"},"👑 Founder"),
        role==="bdo"&&h("span",{className:"live-badge"},"🟢 BDO"),
        h("button",{className:"gear-btn",onClick:()=>setShowSettings(true),title:"Settings"},"⚙️")
      )
    ),
    view==="chat"
      ?h("div",{className:"chat-outer"},h(AILogger,{db,upd,toast:shT,onLeadOpen:setOpenLead}))
      :h("div",{className:"content"},
        view==="daily"&&h(Daily,{db,upd,go:setView,onOpen:setOpenLead,keys,role}),
        view==="pipeline"&&h(Pipeline,{db,upd,toast:shT,onOpen:setOpenLead,onImport:()=>setShowImport(true),role}),
        view==="report"&&h(Report,{db})
      ),
    currentLead&&h(LeadPanel,{leadId:openLead,db,upd,onClose:()=>setOpenLead(null),toast:shT,goChat:()=>setView("chat"),role,keys}),
    showSettings&&h(SettingsModal,{keys,saveKeys,db,upd,toast:shT,onClose:()=>setShowSettings(false),logout}),
    showImport&&h(ImportModal,{db,upd,toast:shT,onClose:()=>setShowImport(false)}),
    h("div",{className:"toast"+(toast.show?" show":"")},toast.msg)
  );
}

function Daily({db,upd,go,onOpen,keys,role}){
  const [perfOpen,setPerfOpen]=useState(false);
  const [callDrawer,setCallDrawer]=useState(null); // {lead, status, timer, note, outcome}
  const [callTimer,setCallTimer]=useState(0);
  const [callInterval,setCallInterval]=useState(null);

  const ta=db.activities.filter(a=>a.loggedAt===TODAY());
  const cnt=ta.length;
  const bk=ta.filter(a=>a.outcome==="Booked meeting").length;
  const won=db.leads.filter(l=>l.stage==="Won");
  const rev=won.reduce((s,l)=>s+(l.dealAmount||6900),0);
  const comm=rev*COMM_RATE;
  const tgt=keys.targetActions||TARGET_ACTIONS;
  const pct=Math.min(Math.round(cnt/tgt*100),100);

  // All leads sorted by last touchpoint (most recent first)
  const leadsWithTouch=db.leads.map(l=>{
    const acts=db.activities.filter(a=>a.leadId===l.id).sort((a,b)=>new Date(b.loggedAt)-new Date(a.loggedAt));
    return{...l,lastTouch:acts[0]?.loggedAt||l.createdAt,lastAct:acts[0]};
  }).sort((a,b)=>new Date(b.lastTouch)-new Date(a.lastTouch));

  // Call drawer functions
  function startCall(lead){
    const interval=setInterval(()=>setCallTimer(t=>t+1),1000);
    setCallInterval(interval);
    setCallTimer(0);
    setCallDrawer({lead,status:"calling",outcome:"No answer",note:""});
    // RingCentral call
    (async()=>{
      try{
        const tokenRes=await fetch("https://platform.ringcentral.com/restapi/oauth/token",{
          method:"POST",
          headers:{"Content-Type":"application/x-www-form-urlencoded","Authorization":"Basic "+btoa(keys.rcClientId+":"+keys.rcClientSecret)},
          body:"grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion="+keys.rcJwt
        });
        const td=await tokenRes.json();
        if(!td.access_token){setCallDrawer(p=>({...p,status:"error",error:"Auth failed"}));return;}
        const callRes=await fetch("https://platform.ringcentral.com/restapi/v1.0/account/~/extension/~/ring-out",{
          method:"POST",
          headers:{"Content-Type":"application/json","Authorization":"Bearer "+td.access_token},
          body:JSON.stringify({from:{phoneNumber:"02844572084"},to:{phoneNumber:normalisePhone(lead.phone)},playPrompt:false})
        });
        const cd=await callRes.json();
        if(cd.id) setCallDrawer(p=>({...p,status:"connected",rcId:cd.id}));
        else setCallDrawer(p=>({...p,status:"error",error:cd.message||"Call failed"}));
      }catch(e){setCallDrawer(p=>({...p,status:"error",error:e.message}));}
    })();
  }

  function endCall(){
    if(callInterval){clearInterval(callInterval);setCallInterval(null);}
    setCallDrawer(p=>({...p,status:"logging"}));
  }

  function saveCall(){
    if(!callDrawer)return;
    const act={id:Date.now(),leadId:callDrawer.lead.id,leadName:callDrawer.lead.name,type:"Call",outcome:callDrawer.outcome,scriptId:null,day:1,note:callDrawer.note,loggedAt:TODAY()};
    upd(p=>{
      const n={...p,activities:[...p.activities,act]};
      if(callDrawer.outcome==="Booked meeting"){
        n.leads=n.leads.map(l=>l.id===callDrawer.lead.id?{...l,stage:"Meeting Booked"}:l);
      } else if(callDrawer.outcome==="Spoke — follow-up"&&callDrawer.lead.stage==="Prospecting"){
        n.leads=n.leads.map(l=>l.id===callDrawer.lead.id?{...l,stage:"Contacted"}:l);
      }
      return n;
    });
    setCallDrawer(null);setCallTimer(0);
  }

  function fmtTime(s){return Math.floor(s/60)+":"+(s%60).toString().padStart(2,"0");}

  return h("div",{className:"daily"},
    // ── METRICS ──
    h("div",{className:"dh"},
      h("div",null,
        h("div",{className:"dg"},"Good morning 👋"),
        h("div",{className:"ds"},new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"})+" · Your day at a glance")
      )
    ),
    h("div",{className:"mg"},
      h("div",{className:"mc"},
        h("div",{className:"ml"},"📞 Actions Today"),
        h("div",{className:"mv"},cnt),

function AILogger({db,upd,toast,onLeadOpen}){
  const [pending,setPending]=useState(null);
  const [msgs,setMsgs]=useState([{role:"ai",text:"Hey! 👋 I'm your AI sales logger.\n\nTell me what happened — I'll log it, match the script, and open the lead card.\n\nIf I'm not sure which lead you mean, I'll ask before logging.\n\nExamples:\n• \"Used opener A on Michael Quinn, no answer. Day 1.\"\n• \"Booked on-site with Sarah for Thursday!\"\n• \"Brennan Recruitment signed — £6,900!\"\n\nWhat just happened? 🎯"}]);
  const [inp,setInp]=useState("");
  const [busy,setBusy]=useState(false);
  const ref=useRef(null);const inpRef=useRef(null);
  const tc=db.activities.filter(a=>a.loggedAt===TODAY()).length;
  useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight;},[msgs]);

  function pickLead(lead,originalText){
    setPending(null);
    send(originalText+" [CONFIRMED LEAD: ID:"+lead.id+" Name:"+lead.name+" Company:"+lead.company+"]");
  }

  function send(text){
    const t=(text||inp).trim();if(!t||busy)return;
    setInp("");setBusy(true);
    setMsgs(p=>[...p,{role:"user",text:t},{role:"ai",text:"..."}]);
    const apiKey=getApiKey(); // kept for backward compat
    const lctx=db.leads.map(l=>"ID:"+l.id+"|"+l.name+"|"+l.company+"|Seg:"+l.seg+"|Stage:"+l.stage).join("\n");
    const sctx=db.scripts.filter(s=>s.active).map(s=>"ID:"+s.id+"|"+s.name+"|"+s.channel).join("\n");
    const sys="You are an AI sales logger for Life Like Media, a Belfast video agency. Standard deal is £6,900 but deals can vary.\n\nLEADS:\n"+lctx+"\n\nACTIVE SCRIPTS:\n"+sctx+"\n\nTODAY: "+TODAY()+"\n\nCRITICAL RULES:\n1. If 2+ leads match a name/company, use action type clarify — never guess.\n2. If message contains [CONFIRMED LEAD: ID:X] use that exact lead.\n3. For deal terms: ONLY use Split Split if the person explicitly says split payment, deposit only, or will pay rest later. Full Pay means the entire amount was paid upfront. A partial amount paid (like 2000 deposit on a 5000 deal) = Split Split. Record the TOTAL deal value as dealAmount, not the deposit amount.\n4. Commission is always 7% of the TOTAL deal value.\n\nReply ONLY valid JSON:\n{reply: message, actions: [{type: log_activity or update_stage or create_lead or clarify or none, data: {}}]}\n\nlog_activity: {leadId, leadName, activityType, outcome, scriptId, cadenceDay, note}\nupdate_stage: {leadId, newStage, dealAmount, dealTerms, depositAmount} — newStage options: Prospecting Contacted Meeting Booked Proposal Sent Won Lost. dealAmount = TOTAL deal value. dealTerms = Full Pay or Split Split. depositAmount = amount paid now if split.\ncreate_lead: {name, company, role, phone, email, seg, source, stage: Prospecting}\nclarify: {matches: [{id, name, company, seg, stage}], originalText}\n\nWhen a deal is Won always show: total deal value, terms, deposit paid if applicable, and commission (7% of total).";
    const history=[...(db.chatHistory||[]).slice(-8),{role:"user",content:t}];
    fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,messages:history})})
    .then(r=>r.json())
    .then(data=>{
      const raw=data.content&&data.content[0]&&data.content[0].text?data.content[0].text:"{}";
      let parsed;try{parsed=JSON.parse(raw);}catch(e){parsed={reply:raw,actions:[]};}
      const cards=[];let affectedId=null;
      upd(prev=>{
        const n={...prev,leads:[...prev.leads],activities:[...prev.activities]};
        (parsed.actions||[]).forEach(a=>{
          if(a.type==="log_activity"&&a.data){
            const act={id:Date.now()+Math.random(),leadId:a.data.leadId,leadName:a.data.leadName||"Unknown",type:a.data.activityType||"Call",outcome:a.data.outcome||"No answer",scriptId:a.data.scriptId||null,day:a.data.cadenceDay||1,note:a.data.note||"",loggedAt:TODAY()};
            n.activities.push(act);affectedId=act.leadId;
            const sc=prev.scripts.find(s=>s.id===act.scriptId);
            cards.push({action:"Activity logged",details:{Lead:act.leadName,Type:act.type,Outcome:act.outcome,Script:sc?sc.name.split("—")[0].trim():"—",Day:"Day "+act.day}});
            // Auto-advance stage
            const lead=n.leads.find(l=>l.id===act.leadId);
            if(lead){
              if(act.outcome==="Booked meeting"&&["Prospecting","Contacted"].includes(lead.stage))lead.stage="Meeting Booked";
              else if(["Spoke – follow-up","Positive reply"].includes(act.outcome)&&lead.stage==="Prospecting")lead.stage="Contacted";
            }
            const key=act.leadId+"_"+act.day;n.manualDays={...(n.manualDays||{}),[key]:true};
          }
          if(a.type==="update_stage"&&a.data){
            const lead=n.leads.find(l=>l.id===a.data.leadId);
            if(lead){
              affectedId=lead.id;const old=lead.stage;lead.stage=a.data.newStage;
              if(a.data.newStage==="Won") lead.wonAt=TODAY();
              if(a.data.dealAmount) lead.dealAmount=a.data.dealAmount;
              if(a.data.dealTerms) lead.dealTerms=a.data.dealTerms;
              if(a.data.depositAmount) lead.depositAmount=a.data.depositAmount;
              const det={Lead:lead.name,From:old,To:lead.stage};
              if(a.data.dealAmount){
                det["Total Deal"]=FMT(a.data.dealAmount);
                det["Terms"]=a.data.dealTerms||"Full Pay";
                if(a.data.depositAmount&&a.data.dealTerms==="Split Split") det["Deposit Paid"]=FMT(a.data.depositAmount);
                det["Commission"]=FMT(a.data.dealAmount*COMM_RATE);
              }
              cards.push({action:"Stage updated",details:det});
            }
          }
          if(a.type==="create_lead"&&a.data){
            const d=a.data;
            const l={id:Date.now(),name:d.name,company:d.company,role:d.role||"",phone:d.phone||"",email:d.email||"",linkedin:"",address:"",website:"",industry:"",revenue:"",employees:"",seg:d.seg||"B",source:d.source||"Scraped list",stage:d.stage||"Prospecting",createdAt:TODAY(),notes:""};
            n.leads.push(l);affectedId=l.id;cards.push({action:"Lead added",details:{Name:l.name,Company:l.company,Segment:l.seg}});
          }
          if(a.type==="clarify"&&a.data&&a.data.matches){
            setTimeout(()=>setPending({matches:a.data.matches,originalText:a.data.originalText||t}),0);
          }
        });
        n.chatHistory=[...(prev.chatHistory||[]),{role:"user",content:t},{role:"assistant",content:raw}].slice(-20);
        return n;
      });
      if(affectedId)onLeadOpen(affectedId);
      setMsgs(p=>{const u=[...p];u[u.length-1]={role:"ai",text:parsed.reply||"Got it!",cards};return u;});
    })
    .catch(()=>{
      setMsgs(p=>{const u=[...p];u[u.length-1]={role:"ai",text:"Connection error. Check your API key in Settings (⚙️ top right) and try again."};return u;});
    })
    .finally(()=>{setBusy(false);if(inpRef.current)inpRef.current.focus();});
  }

  return h("div",{className:"chat-wrap"},
    h("div",{className:"chat-hdr"},
      h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between"}},
        h("div",null,h("h2",null,"AI Activity Logger 🤖"),h("p",null,"Talk naturally. I log it, match the script, open the lead card. I'll ask if I'm not sure who you mean.")),
        h("div",{style:{display:"flex",gap:8,alignItems:"center"}},h("span",{style:{fontSize:11,color:"var(--tx2)"}},tc+" today"),h("button",{className:"btn btn-s btn-sm",onClick:()=>{setMsgs([{role:"ai",text:"Cleared. What just happened? 🎯"}]);upd(p=>({...p,chatHistory:[]}));}},"Clear"))
      ),
      h("div",{className:"chips"},CHIPS.map(c=>h("button",{key:c.l,className:"chip",onClick:()=>send(c.t)},c.l)))
    ),
    h("div",{className:"msgs",ref},msgs.map((m,i)=>h("div",{key:i,className:"msg "+(m.role==="user"?"u":"a")},
      h("div",{className:"av "+(m.role==="user"?"u":"ai")},m.role==="user"?"👤":"🤖"),
      h("div",null,
        m.text==="..."?h("div",{className:"bub ai"},h("div",{className:"typing"},h("span"),h("span"),h("span"))):
        m.text&&h("div",{className:"bub "+(m.role==="user"?"u":"ai")},m.text.split("\n").map((l,j)=>h(React.Fragment,{key:j},l,h("br")))),
        (m.cards||[]).map((c,j)=>h("div",{key:j,className:"lcard"},h("div",{className:"lct"},"✅ "+c.action),Object.entries(c.details).map(([k,v])=>h("div",{key:k,className:"lr"},h("span",{className:"lk"},k),h("span",{className:"lv"},v)))))
      )
    ))),
    pending&&h("div",{style:{padding:"12px 22px",background:"var(--bg)",borderTop:"1px solid var(--bd)",flexShrink:0}},
      h("div",{style:{fontSize:12,fontWeight:700,color:"var(--tx)",marginBottom:9}},"🤔 Which lead did you mean?"),
      h("div",{style:{display:"flex",flexDirection:"column",gap:6}},
        pending.matches.map(m=>h("button",{key:m.id,className:"btn btn-s",style:{textAlign:"left",padding:"10px 14px",display:"flex",alignItems:"center",gap:10},onClick:()=>pickLead(m,pending.originalText)},
          h("span",{className:"seg-"+m.seg.toLowerCase(),style:{fontWeight:700,fontSize:14}},"["+m.seg+"]"),
          h("div",null,h("div",{style:{fontWeight:600,fontSize:13}},m.name),h("div",{style:{fontSize:11,color:"var(--tx2)"}},m.company+" · "+m.stage))
        ))
      ),
      h("button",{className:"btn btn-s btn-sm",style:{marginTop:8,width:"100%"},onClick:()=>setPending(null)},"Cancel")
    ),
    h("div",{className:"inp-area"},
      h("div",{className:"inp-wrap"},
        h("textarea",{ref:inpRef,className:"itx",value:inp,onChange:e=>setInp(e.target.value),onKeyDown:e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}},placeholder:"e.g. 'Used opener A on Michael Quinn, no answer. Day 1.' or 'Brennan signed!'",rows:1}),
        h("button",{className:"sbtn",onClick:()=>send(),disabled:busy||!inp.trim()},"➤")
      ),
      h("div",{className:"ihint"},"Enter to send · Shift+Enter for new line")
    )
  );
}
</script>

<script>
function Pipeline({db,upd,toast,onOpen,onImport,role}){
  const [addCol,setAddCol]=useState(null); // which stage to add lead to
  const [addForm,setAddForm]=useState({name:"",company:"",phone:"",role:"",seg:"A"});
  const dragId=useRef(null);

  function onDS(e,id){dragId.current=id;e.dataTransfer.effectAllowed="move";e.currentTarget.classList.add("dragging");}
  function onDE(e){e.currentTarget.classList.remove("dragging");document.querySelectorAll(".kcol").forEach(c=>c.classList.remove("dov"));}
  function onCDO(e){e.preventDefault();document.querySelectorAll(".kcol").forEach(c=>c.classList.remove("dov"));e.currentTarget.classList.add("dov");}
  function onDrop(e,stage){
    e.preventDefault();document.querySelectorAll(".kcol").forEach(c=>c.classList.remove("dov"));
    if(dragId.current===null)return;
    const id=dragId.current;
    upd(p=>({...p,leads:p.leads.map(l=>l.id===id?{...l,stage}:l)}));
    toast("Moved to "+stage);
    dragId.current=null;
  }

  function quickAdd(){
    if(!addForm.name||!addForm.company){toast("Name and company required");return;}
    const l={id:Date.now(),name:addForm.name,company:addForm.company,role:addForm.role||"",phone:addForm.phone||"",email:"",linkedin:"",address:"",website:"",industry:"",revenue:"",employees:"",seg:addForm.seg,source:"Manual",stage:addCol,createdAt:TODAY(),notes:""};
    upd(p=>({...p,leads:[...p.leads,l]}));
    toast("Lead added to "+addCol);setAddCol(null);setAddForm({name:"",company:"",phone:"",role:"",seg:"A"});
  }

  const totalPipeline=db.leads.filter(l=>!["Won","Lost"].includes(l.stage)).length;
  const wonCount=db.leads.filter(l=>l.stage==="Won").length;
  const commEarned=db.leads.filter(l=>l.stage==="Won").reduce((s,l)=>s+(l.dealAmount||6900)*COMM_RATE,0);

  return h("div",null,
    h("div",{className:"fb"},
      h("div",null,
        h("div",{className:"sh2"},"Pipeline 💼"),
        h("div",{className:"sub"},totalPipeline+" active leads · "+wonCount+" won · ",h("span",{style:{color:"var(--pu)",fontWeight:600}},FMT(commEarned)+" commission earned"))
      ),
      h("div",{className:"fr"},
        h("button",{className:"btn btn-s",onClick:onImport},"📥 Import CSV"),
        h("button",{className:"btn btn-p",onClick:()=>setAddCol("Prospecting")},"+ Add Lead")
      )
    ),
    h("div",{className:"kanban"},
      STAGES.map(stage=>{
        const leads=db.leads.filter(l=>l.stage===stage);
        const stageRev=stage==="Won"?leads.length*6900:0;
        return h("div",{key:stage,className:"kcol",onDragOver:onCDO,onDrop:e=>onDrop(e,stage),onDragLeave:e=>e.currentTarget.classList.remove("dov")},
          h("div",{className:"kct"},
            h("span",null,STAGE_EMOJI[stage]+" "+stage),
            h("div",{style:{display:"flex",alignItems:"center",gap:5}},
              stage==="Won"&&h("span",{style:{fontSize:9,color:"var(--acd)",fontWeight:600}},FMT(stageRev)),
              h("span",{className:"kbadge"},leads.length),
              role==="founder"&&leads.length>0&&h("button",{style:{background:"none",border:"none",fontSize:10,color:"var(--tx3)",cursor:"pointer",padding:"0 2px"},title:"Clear all "+stage+" leads",onClick:async(e)=>{
                e.stopPropagation();
                if(!confirm("Delete all "+leads.length+" leads in "+stage+"? Cannot be undone."))return;
                for(const l of leads){
                  await supa.from("activities").delete().eq("lead_id",l.id);
                  await supa.from("manual_days").delete().eq("lead_id",l.id);
                  await supa.from("leads").delete().eq("id",l.id);
                }
                const ids=leads.map(l=>l.id);
                upd(p=>({...p,leads:p.leads.filter(l=>!ids.includes(l.id)),activities:p.activities.filter(a=>!ids.includes(a.leadId))}));
                toast("Cleared "+stage);
              }},"✕ clear")
            )
          ),
          h("div",{className:"kcol-cards"},
            leads.length===0&&h("div",{style:{fontSize:10,color:"var(--tx3)",textAlign:"center",padding:"14px 0",fontStyle:"italic"}},"Drop here"),
            leads.map(l=>h("div",{key:l.id,className:"kb",draggable:true,onDragStart:e=>onDS(e,l.id),onDragEnd:onDE,onClick:()=>onOpen(l.id)},
              h("div",{className:"kbn"},l.name),
              h("div",{className:"kbs"},l.company),
              h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:5}},
                h("span",{className:"seg-"+l.seg.toLowerCase(),style:{fontSize:11}},l.seg),

// ── WEEKLY REPORT ──
function Report({db}){
  const [text,setText]=useState("");
  const [flags,setFlags]=useState([]);
  const [loading,setLoading]=useState(false);
  const [gen,setGen]=useState(false);
  const ago=new Date();ago.setDate(ago.getDate()-7);
  const recent=db.activities.filter(a=>new Date(a.loggedAt)>=ago);
  const won=db.leads.filter(l=>l.stage==="Won");
  const avg=Math.round(recent.length/7);
  const meet=recent.filter(a=>a.outcome==="Booked meeting").length;
  const rev=won.reduce((s,l)=>s+(l.dealAmount||6900),0);
  const comm=rev*COMM_RATE;

  function generate(){
    const apiKey=getApiKey(); // kept for backward compat
    setLoading(true);setText("");setFlags([]);setGen(true);
    const active=db.leads.filter(l=>!["Won","Lost"].includes(l.stage));
    const stages=db.leads.reduce((a,l)=>{a[l.stage]=(a[l.stage]||0)+1;return a;},{});
    const prompt="Sales analyst for Life Like Media, a Belfast video agency. £6,900 packages. 7% commission.\n\nTargets: "+TARGET_ACTIONS+" actions/day, "+TARGET_MEETINGS+" meetings/week, 1 deal/week.\n\nThis week:\n- Activities: "+recent.length+" (target "+(TARGET_ACTIONS*7)+")\n- Avg/day: "+avg+" (target "+TARGET_ACTIONS+")\n- Meetings booked: "+meet+" (target "+TARGET_MEETINGS+")\n- Deals won: "+won.length+"\n- Revenue: "+FMT(rev)+"\n- Commission earned: "+FMT(comm)+"\n- Active pipeline: "+active.length+" leads\n- Pipeline by stage: "+JSON.stringify(stages)+"\n\nWrite a sharp honest 3-paragraph performance report. Direct startup tone. Under 220 words. Include commission. Emojis sparingly.";
    fetch("/api/report",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,stream:true,messages:[{role:"user",content:prompt}]})})
    .then(res=>{
      const reader=res.body.getReader();const dec=new TextDecoder();let full="";
      function read(){return reader.read().then(({done,value})=>{if(done)return;dec.decode(value).split("\n").forEach(l=>{if(l.startsWith("data: ")){try{const d=JSON.parse(l.slice(6));if(d.delta&&d.delta.text){full+=d.delta.text;setText(full);}}catch(e){}}});return read();});}
      return read();
    })
    .then(()=>{
      const f=[];
      if(avg<50)f.push({t:"r",i:"🚨",m:"Critical: Only "+avg+" actions/day vs "+TARGET_ACTIONS+" target."});
      else if(avg<80)f.push({t:"w",i:"⚠️",m:"Below target: "+avg+"/day."});
      else f.push({t:"g",i:"✅",m:"Strong volume: "+avg+" actions/day."});
      if(meet<3)f.push({t:"r",i:"🚨",m:"Only "+meet+" meetings (target: "+TARGET_MEETINGS+")."});
      else if(meet<TARGET_MEETINGS)f.push({t:"w",i:"⚠️",m:meet+"/"+TARGET_MEETINGS+" meetings."});
      else f.push({t:"g",i:"✅",m:"Meeting target hit: "+meet+" booked."});
      if(!won.length)f.push({t:"w",i:"⚠️",m:"No deals won. "+FMT(comm)+" commission outstanding."});
      else f.push({t:"g",i:"✅",m:won.length+" deal(s) · "+FMT(rev)+" revenue · "+FMT(comm)+" commission."});
      setFlags(f);
    })
    .catch(()=>setText("Could not generate. Check your API key in Settings."))
    .finally(()=>setLoading(false));
  }

  return h("div",null,
    h("div",{className:"fb"},
      h("div",null,h("div",{className:"sh2"},"Weekly Report 📊"),h("div",{className:"sub"},"AI-generated · commission tracking included")),
      h("button",{className:"btn btn-ai",onClick:generate,disabled:loading},loading?"⏳ Generating...":"✨ Generate Report")
    ),
    h("div",{className:"mg"},
      h("div",{className:"mc"},h("div",{className:"ml"},"📞 Activities (7d)"),h("div",{className:"mv"},recent.length)),
      h("div",{className:"mc"},h("div",{className:"ml"},"📅 Avg/Day"),h("div",{className:"mv"},avg),h("div",{className:"ms"+(avg>=TARGET_ACTIONS?" up":" wn")},avg>=TARGET_ACTIONS?"✅ On target":"Target: "+TARGET_ACTIONS)),
      h("div",{className:"mc"},h("div",{className:"ml"},"🏆 Revenue Won"),h("div",{className:"mv"},FMT(rev))),
      h("div",{className:"mc"},h("div",{className:"ml"},"💜 Commission"),h("div",{className:"mv",style:{color:"var(--pu)"}},FMT(comm)),h("div",{className:"ms"},"@ 7%"))
    ),
    gen
      ?h(React.Fragment,null,
          h("div",{className:"card"},
            h("div",{className:"ct"},loading&&h("span",{className:"pulse"}),"🤖 AI Sales Report"),
            h("div",{className:"rw"},h("div",{className:"rt"},text||(loading?"Analysing...":"")))
          ),
          flags.length>0&&h("div",{className:"card"},
            h("div",{className:"ct"},"🚩 Flags"),
            flags.map((f,i)=>h("div",{key:i,className:"rflag "+(f.t==="g"?"g":f.t==="w"?"w":"r")},h("span",{style:{fontWeight:700,marginRight:8}},f.i),h("span",{style:{fontSize:12,color:"var(--tx)",lineHeight:1.5}},f.m)))
          )
        )
      :h("div",{className:"card",style:{textAlign:"center",padding:40,borderColor:"var(--acm)"}},
          h("div",{style:{fontSize:38,marginBottom:11}},"📊"),
          h("h3",{style:{fontFamily:"'Libre Baskerville',Georgia,serif",fontSize:15,marginBottom:6}},"Ready to review your week?"),
          h("div",{style:{fontSize:12,color:"var(--tx2)",marginBottom:16}},"AI analysis with revenue, commission and gap flagging."),
          h("button",{className:"btn btn-ai",onClick:generate},"✨ Generate This Week's Report")
        )
  );
}

function SettingsModal({keys,saveKeys,db,upd,toast,onClose,logout}){
  const [ak,setAk]=useState(()=>localStorage.getItem("sos_api_key")||"");
  const [f,setF]=useState({...keys});
  const [scriptCh,setScriptCh]=useState("All");

  const [addScript,setAddScript]=useState(false);
  const [scriptForm,setScriptForm]=useState({name:"",channel:"Call",useCase:"Cold",copy:"",active:true});
  const channels=["All","Call","Email","LinkedIn","SMS","Voicemail","Door Knock"];
  const scripts=scriptCh==="All"?db.scripts:db.scripts.filter(s=>s.channel===scriptCh);

    toast("Script added");setAddScript(false);setScriptForm({name:"",channel:"Call",useCase:"Cold",copy:"",active:true});

// ── CSV IMPORT MODAL ──
function ImportModal({db,upd,toast,onClose}){
  const [phase,setPhase]=useState("upload");
  const [proc,setProc]=useState([]);
  const [sum,setSum]=useState({total:0,a:0,b:0,c:0});
  const [fn,setFn]=useState("");

  function parseLine(l){const r=[];let c="",q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"'){q=!q;}else if(ch===","&&!q){r.push(c.trim());c="";}else c+=ch;}r.push(c.trim());return r;}

  function runCSV(text,fname){
    setFn(fname);setPhase("processing");
    setTimeout(()=>{
      const lines=text.trim().split("\n").filter(Boolean);
      if(lines.length<2){toast("CSV needs at least 2 rows");setPhase("upload");return;}
      const rawHdrs=parseLine(lines[0]);
      const hdrs=rawHdrs.map(h=>h.trim());
      const rows=lines.slice(1).map(l=>{const v=parseLine(l);const o={};hdrs.forEach((h,i)=>o[h]=(v[i]||"").trim());return o;});
      const map={},used=new Set();
      // Direct matches for common sheet headers including your format
      const directMap={"BRAND":"company","brand":"company","Brand":"company","Company Name":"company","INDUSTRY":"industry","Industry":"industry","industry":"industry","Contact":"name","contact":"name","CONTACT":"name","Role":"role","ROLE":"role","Phone Number":"phone","PHONE NUMBER":"phone","phone number":"phone","Phone":"phone","PHONE":"phone","Email":"email","EMAIL":"email","Email Address":"email","Address":"address","ADDRESS":"address","address":"address","Town":"location","TOWN":"location","town":"location","Postcode":"postcode","POSTCODE":"postcode","postcode":"postcode"};
      const fc=hdrs.find(x=>/first.?name/i.test(x)),lc=hdrs.find(x=>/last.?name/i.test(x));
      if(fc){map[fc]="first_name";used.add("first_name");}if(lc){map[lc]="last_name";used.add("last_name");}
      hdrs.forEach(hh=>{if(map[hh])return;if(directMap[hh]&&!used.has(directMap[hh])){map[hh]=directMap[hh];used.add(directMap[hh]);return;}const hl=hh.toLowerCase().trim();let bf="",bs=0;Object.entries(FP).forEach(([f,ps])=>{if(used.has(f))return;ps.forEach(p=>{const sc=hl===p?4:hl.includes(p)||p.includes(hl)?3:lev(hl,p)<=2?2:0;if(sc>bs){bs=sc;bf=f;}});});if(bf&&bs>=2){map[hh]=bf;used.add(bf);}else map[hh]="";});
      const seen=new Set();
      const ek=new Set(db.leads.map(l=>(l.name||"").toLowerCase()+"|"+(l.company||"").toLowerCase()).filter(k=>k!=="|"));
      const result=rows.map(row=>{
        const m={};
        // Map each column to its field
        Object.entries(map).forEach(([col,field])=>{
          const val=(row[col]||"").trim();
          if(!field||!val) return;
          if(field==="first_name") m._f=val;
          else if(field==="last_name") m._l=val;
          else if(field==="postcode"){m.postcode=val;if(!m.location)m.location=val;}
          else m[field]=val;
        });
        // Handle split first/last name
        if(m._f||m._l){m.name=[m._f,m._l].filter(Boolean).join(" ");delete m._f;delete m._l;}
        // Clean name — trim extra spaces
        if(m.name) m.name=m.name.trim();
        // Clean company — remove hyphens, title case
        if(m.company) m.company=m.company.replace(/-/g," ").replace(/\w/g,c=>c.toUpperCase()).trim();
        // Normalise phone to local UK format for RingCentral
        if(m.phone) m.phone=normalisePhone(m.phone);
        // Default source
        if(!m.source) m.source="Scraped list";
        // Auto-score segment
        m.seg=scoreSeg(m);
        // Deduplicate
        const k=(m.name||"").toLowerCase()+"|"+(m.company||"").toLowerCase();
        const hasData=!!(m.name||m.company);
        m._dup=hasData&&(seen.has(k)||ek.has(k));
        if(hasData&&k!=="|") seen.add(k);
        return m;
      });
      setProc(result);setPhase("preview");
    },700);
  }

  function loadSample(t){const s=SAMPLE_CSV[t];const text=[s.h.join(","),...s.r.map(r=>r.join(","))].join("\n");runCSV(text,t+"_export.csv");}

  function doImport(){
    const nl=proc.filter(r=>!r._dup&&(r.name||r.company));
    const a=nl.filter(r=>r.seg==="A").length,b=nl.filter(r=>r.seg==="B").length,c=nl.filter(r=>r.seg==="C").length;
    upd(p=>({...p,leads:[...p.leads,...nl.map(r=>({
              id:Date.now()+Math.random(),
              name:r.name||"",
              company:r.company||"",
              role:r.role||"",
              phone:r.phone||"",
              email:r.email||"",
              linkedin:r.linkedin||"",
              address:r.address||r.location||"",
              postcode:r.postcode||"",
              website:r.website||"",
              instagram:"",facebook:"",twitter:"",
              industry:r.industry||"",
              revenue:r.revenue||"",
              employees:r.employees||"",
              seg:r.seg,
              source:r.source||"Scraped list",
              owner:"",
              stage:"Prospecting",
              createdAt:TODAY(),
              notes:""
            }))]}));
    setSum({total:nl.length,a,b,c});setPhase("done");toast("🎉 "+nl.length+" leads imported into Prospecting!");
  }

  const nc=proc.filter(r=>!r._dup).length;

  return h("div",{className:"mbg",onClick:onClose},
    h("div",{className:"mbox",style:{width:620},onClick:e=>e.stopPropagation()},
      h("div",{className:"mh"},h("h2",null,"📥 Import Leads"),h("button",{className:"mc2",onClick:onClose},"✕")),

      phase==="upload"&&h("div",null,
        h("div",{className:"uz",onDragOver:e=>{e.preventDefault();e.currentTarget.style.borderColor="var(--ac)";},onDragLeave:e=>{e.currentTarget.style.borderColor="var(--bd2)";},onDrop:e=>{e.preventDefault();e.currentTarget.style.borderColor="var(--bd2)";const fi=e.dataTransfer.files[0];if(fi&&fi.name.endsWith(".csv")){const r=new FileReader();r.onload=x=>runCSV(x.target.result,fi.name);r.readAsText(fi);}else toast("Please drop a .csv file");}},
          h("input",{type:"file",accept:".csv",onChange:e=>{const fi=e.target.files&&e.target.files[0];if(fi){const r=new FileReader();r.onload=x=>runCSV(x.target.result,fi.name);r.readAsText(fi);}},style:{position:"absolute",inset:0,opacity:0,cursor:"pointer"}}),
          h("div",{style:{fontSize:32,marginBottom:9}},"📂"),
          h("div",{style:{fontFamily:"'Libre Baskerville',Georgia,serif",fontSize:15,color:"var(--tx)",marginBottom:5}},"Drop your CSV here or click to browse"),
          h("div",{style:{fontSize:12,color:"var(--tx2)",marginBottom:12}},"Any column names — AI maps and segments automatically"),
          h("div",{style:{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap"}},["LinkedIn Sales Navigator","Apollo.io","Google Sheets","Excel","Manual"].map(s=>h("span",{key:s,style:{background:"var(--bg3)",border:"1px solid var(--bd)",borderRadius:20,padding:"3px 10px",fontSize:10,color:"var(--tx2)"}},s)))
        ),
        h("div",{style:{marginTop:12}},
          h("div",{style:{fontSize:11,fontWeight:700,color:"var(--tx2)",marginBottom:8}},"Try sample data:"),
          h("div",{className:"fr"},h("button",{className:"btn btn-s",onClick:()=>loadSample("apollo")},"Apollo.io"),h("button",{className:"btn btn-s",onClick:()=>loadSample("linkedin")},"LinkedIn"),h("button",{className:"btn btn-s",onClick:()=>loadSample("manual")},"Manual"))
        )
      ),

      phase==="processing"&&h("div",null,
        h("div",{className:"ai-proc"},h("div",{className:"spinner"}),h("div",null,h("div",{style:{fontWeight:600,fontSize:13}},fn),h("div",{style:{fontSize:12,color:"var(--tx2)",marginTop:2}},"AI reading columns and scoring every lead..."))),
        h("div",{className:"proc-bar"},h("div",{className:"proc-fill"}))
      ),

      phase==="preview"&&h("div",null,
        h("div",{className:"sbar"},[["📊 Total",proc.length,""],["✅ New",nc,"g"],["⚠️ In system",proc.filter(r=>r._dup).length,"am"],["🎯 A-segment",proc.filter(r=>r.seg==="A"&&!r._dup).length,"g"]].map(([l,v,c])=>h("div",{key:l,className:"sbox"},h("div",{className:"sbl"},l),h("div",{className:"sbv"+(c?" "+c:"")},v)))),
        h("div",{style:{overflowX:"auto",maxHeight:220,overflowY:"auto",border:"1px solid var(--bd)",borderRadius:8,marginBottom:12}},
          h("table",{style:{width:"100%",borderCollapse:"collapse"}},
            h("thead",null,h("tr",null,["Seg","Name","Company","Role","Status"].map(c=>h("th",{key:c,style:{fontSize:10,color:"var(--tx3)",textTransform:"uppercase",letterSpacing:".7px",padding:"7px 10px",textAlign:"left",borderBottom:"1px solid var(--bd)",fontWeight:700,background:"var(--bg2)"}},c)))),
            h("tbody",null,proc.slice(0,50).map((row,i)=>h("tr",{key:i,style:{opacity:row._dup?0.45:1}},
              h("td",{style:{padding:"7px 10px"}},h("span",{style:{fontWeight:700,fontSize:11,color:row.seg==="A"?"var(--acd)":row.seg==="B"?"var(--am)":"var(--tx3)"}},row.seg)),
              h("td",{style:{padding:"7px 10px",fontWeight:600,fontSize:12}},row.name||"—"),
              h("td",{style:{padding:"7px 10px",color:"var(--tx2)",fontSize:12}},row.company||"—"),
              h("td",{style:{padding:"7px 10px",color:"var(--tx2)",fontSize:11}},row.role||"—"),
              h("td",{style:{padding:"7px 10px"}},row._dup?h("span",{style:{fontSize:10,background:"var(--rdl)",color:"var(--rd)",padding:"2px 7px",borderRadius:20,fontWeight:700}},"Already added"):h("span",{style:{fontSize:10,background:"var(--acl)",color:"var(--acd)",padding:"2px 7px",borderRadius:20,fontWeight:700}},"New"))
            )))
          )
        ),
        h("div",{style:{display:"flex",gap:8,justifyContent:"flex-end"}},
          h("button",{className:"btn btn-s",onClick:()=>{setPhase("upload");setProc([]);}},"← Back"),
          h("button",{className:"btn btn-p",style:{padding:"9px 20px"},onClick:doImport},"✅ Import "+nc+" leads to Prospecting")
        )
      ),

      phase==="done"&&h("div",{style:{textAlign:"center",padding:32}},
        h("div",{style:{fontSize:42,marginBottom:12}},"🎉"),
        h("h2",{style:{fontFamily:"'Libre Baskerville',Georgia,serif",fontSize:19,marginBottom:7}},"Import Complete!"),
        h("div",{style:{fontSize:13,color:"var(--tx2)",marginBottom:20}},sum.total+" leads added to Prospecting · "+sum.a+" A · "+sum.b+" B · "+sum.c+" C"),
        h("div",{style:{display:"flex",gap:8,justifyContent:"center"}},
          h("button",{className:"btn btn-s",onClick:()=>{setPhase("upload");setProc([]);setSum({total:0,a:0,b:0,c:0});}},"Import Another"),
          h("button",{className:"btn btn-p",onClick:onClose},"View Pipeline →")
        )
      )
    )
  );
}
